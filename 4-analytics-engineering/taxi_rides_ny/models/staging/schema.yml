version: 2

sources:
  - name: staging
    database: rgpeart-datatalks-de-course
    schema: zoomcamp

    tables:
      - name: green_tripdata
      - name: yellow_tripdata

models:
  - name: stg_green_tripdata 
    description: >
      Trip made by green taxis, also known as boro taxis and street-hail liveries.
      Green taxis may respond to street hails, but only in the areas indicated in green on the
      map (i.e. above W110 St./E 96th St. in Manhattan and in the boroughs).
      The records were collected and provided to the NYC Taxi and Limousine Commission (TLC) by
      technology service providers.

      This should match the `stg_green_tripdata` view stored in BigQuery.
    columns:
      #- name: unique_row_id
      #  description: Primary key, unique identifier for this table, generated by hashing key trip attributes.
      #  tests:
      #    - unique:
      #        config:
      #          severity: Warn
      #    - not_null: 
      #        config:
      #          severity: Warn
      - name: vendor_id
        description: >
          A code indicating the TPEP provider that provided the record.
          1 = Creative Mobile Technologies, LLC;
          2 = Verifone Inc.
      - name: pickup_datetime
        description: The date and time when the meter was engaged
      - name: dropoff_datetime
        description: The date and time when the meter was disengaged
      - name: store_and_fwd_flag
        description: > 
          This flag indicates whether the trip record was held in vehicle memory 
          before sending to the vendor, aka "store and forward," because the 
          vehicle did not have a connection to the server. 
          Y= store and forward trip 
          N= not a store and forward trip
      - name: rate_code_id
        description: >
          The final rate code in effect at the end of the trip. 
          1= Standard rate 
          2=JFK 
          3=Newark 
          4=Nassau or Westchester 
          5=Negotiated fare 6=Group ride
      - name: pickup_location_id
        description: TLC Taxi Zone in which the taximeter was engaged
        data_tests:
          - relationships:
              arguments:
                to: ref('taxi_zone_lookup')
                field: locationid
              config: 
                severity: Warn
      - name: dropoff_location_id
        description: TLC Taxi Zone in which the taximeter was disengaged
        data_tests:
          - relationships:
              arguments: 
                to: ref('taxi_zone_lookup')
                field: locationid
              config: 
                severity: Warn
      - name: passenger_count
        description: The number of passengers in the vehicle. This is a driver-entered value.
      - name: trip_distance
        description: The elapsed trip distance in miles reported by the taximeter.
      - name: fare_amount
        description: The time-and-distance fare calculated by the meter
      - name: extra
        description: >
          Miscellaneous extras and surcharges. 
          Currently, this only includes the $0.50 and $1 rush hour and overnight charges
      - name: mta_tax
        description: $0.50 MTA tax that is automatically triggered based on the metered rate in use
      - name: tip_amount
        description: >
          Tip amount. This field is automatically populated for credit card tips. 
          Cash tips are not included.
      - name: tolls_amount
        description: Total amount of all tolls paid in trip.
      - name: ehail_fee
        description: --
      - name: improvement_surcharge
        description: >
          $0.30 improvement surcharge assessed on hailed trips at the flag drop. 
          The improvement surcharge began being levied in 2015.
      - name: total_amount
        description: The total amount charged to passengers. Does not include cash tips.
      - name: payment_type
        description: >
          A numeric code signifying how the passenger paid for the trip. 
          1= Credit card 
          2= Cash 
          3= No charge 
          4= Dispute 
          5= Unknown 
          6= Voided trip
        data_tests:
          - accepted_values:
              arguments: 
                values: ["{{ var('payment_type_values') }}"]
                quote: false
              config: 
                severity: Warn
      - name: trip_type
        description: >
          A code indicating whether the trip was a street-hail or a dispatch that is 
          automatically assigned based on the metered rate in use but can be altered by the driver. 
          1= Street-hail 
          2= Dispatch
      #- name: congestion_surcharge
      #  description: Congestion surcharge applied to trips in congested zones
  
  - name: stg_yellow_tripdata
    description: >
      Trips made by New York City's iconic yellow taxis. 
      Yellow taxis are the only vehicles permitted to respond to a street hail from a passenger in all five
      boroughs. They may also be hailed using an e-hail app like Curb or Arro.
      The records were collected and provided to the NYC Taxi and Limousine Commission (TLC) by
      technology service providers.

      This should match the `stg_yellow_tripdata` view stored in BigQuery.
